<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Eloria icon">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1B4D3E"/>

  <!-- European arch motif — centered in circle -->
  <!-- Outer arch -->
  <path d="M14 52 L14 30 Q14 12 32 12 Q50 12 50 30 L50 52" stroke="#FAF7F0" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
  <!-- Inner arch -->
  <path d="M20 52 L20 32 Q20 18 32 18 Q44 18 44 32 L44 52" stroke="#C5963A" stroke-width="1.8" fill="none"/>
  <!-- Keystone / crown jewel at apex -->
  <circle cx="32" cy="12" r="4" fill="#C5963A"/>
  <circle cx="32" cy="12" r="2" fill="#FAF7F0"/>
  <!-- Base ground -->
  <rect x="12" y="51" width="40" height="3" rx="1.5" fill="#FAF7F0" opacity="0.4"/>
  <!-- Subtle road path -->
  <path d="M22 52 Q32 58 42 52" stroke="#C5963A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
