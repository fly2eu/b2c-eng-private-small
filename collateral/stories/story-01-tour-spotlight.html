<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Elide Story — Tour Spotlight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; }
  .canvas {
    width: 1080px; height: 1920px;
    position: relative;
    background: #0F2A1A;
    overflow: hidden;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=90&auto=format');
    background-size: cover;
    background-position: center top;
    height: 75%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(15,42,26,0.1) 0%,
      rgba(15,42,26,0.3) 40%,
      rgba(15,42,26,0.85) 65%,
      rgba(15,42,26,0.98) 100%
    );
  }
  .top-bar {
    position: absolute;
    top: 60px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Georgia', serif;
    font-size: 20px;
    letter-spacing: 5px;
    color: white;
    text-transform: uppercase;
  }
  .story-tag {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
  }
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 60px;
    padding-bottom: 120px;
  }
  .eyebrow {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #DAA521;
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Georgia', serif;
    font-size: 72px;
    font-weight: 400;
    color: white;
    line-height: 1.08;
    margin-bottom: 24px;
    letter-spacing: -1px;
  }
  h1 em {
    font-style: italic;
    color: #E8C04A;
  }
  .meta-row {
    display: flex;
    gap: 24px;
    margin-bottom: 36px;
  }
  .meta-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .meta-icon {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: rgba(218,165,33,0.2);
    border: 1px solid rgba(218,165,33,0.5);
    flex-shrink: 0;
  }
  .meta-text {
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
  }
  .price-block {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(218,165,33,0.3);
    backdrop-filter: blur(10px);
    padding: 28px 36px;
    border-radius: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
  }
  .price-from {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 4px;
  }
  .price {
    font-family: 'Georgia', serif;
    font-size: 44px;
    color: #DAA521;
    font-weight: 400;
  }
  .price-sub {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .cta-btn {
    background: #25D366;
    padding: 22px 48px;
    border-radius: 8px;
    text-align: center;
    font-family: 'Arial', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .swipe {
    text-align: center;
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="logo">ELIDE</span>
    <span class="story-tag">Tour Spotlight</span>
  </div>
  <div class="content">
    <div class="eyebrow">Switzerland · 9 days</div>
    <h1>Switzerland<br><em>Wonderland</em></h1>
    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-icon"></div>
        <span class="meta-text">Private Mercedes throughout</span>
      </div>
      <div class="meta-item">
        <div class="meta-icon"></div>
        <span class="meta-text">Up to 6 guests</span>
      </div>
    </div>
    <div class="price-block">
      <div>
        <p class="price-from">Starting from</p>
        <p class="price">EUR 2,490</p>
        <p class="price-sub">per person · twin sharing</p>
      </div>
      <div style="text-align:right">
        <p style="font-family:'Arial',sans-serif;font-size:13px;color:rgba(255,255,255,0.5);">Includes</p>
        <p style="font-family:'Arial',sans-serif;font-size:13px;color:rgba(255,255,255,0.75);margin-top:4px;">4-star hotels</p>
        <p style="font-family:'Arial',sans-serif;font-size:13px;color:rgba(255,255,255,0.75);">Daily breakfast</p>
        <p style="font-family:'Arial',sans-serif;font-size:13px;color:rgba(255,255,255,0.75);">All transfers</p>
      </div>
    </div>
    <div class="cta-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      WhatsApp us to enquire
    </div>
    <p class="swipe">Swipe up · elide.com/tours</p>
  </div>
</div>
</body>
</html>
