<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Elide Story — Poll / Engagement</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1920px; overflow: hidden; }
  .canvas {
    width: 1080px; height: 1920px;
    position: relative;
    overflow: hidden;
    background: #0F2A1A;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=90&auto=format');
    background-size: cover;
    background-position: center top;
    height: 55%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(15,42,26,0.15) 0%,
      rgba(15,42,26,0.4) 35%,
      rgba(15,42,26,0.92) 55%,
      rgba(15,42,26,1) 100%
    );
  }
  .top-bar {
    position: absolute;
    top: 60px;
    left: 60px;
    right: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Georgia', serif;
    font-size: 20px;
    letter-spacing: 5px;
    color: white;
    text-transform: uppercase;
  }
  .tag {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(8px);
    padding: 8px 18px;
    border-radius: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
  }
  /* Poll area */
  .poll-area {
    position: absolute;
    top: 900px;
    left: 60px;
    right: 60px;
  }
  .question-eyebrow {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #DAA521;
    margin-bottom: 16px;
  }
  .question {
    font-family: 'Georgia', serif;
    font-size: 58px;
    font-weight: 400;
    color: white;
    line-height: 1.1;
    margin-bottom: 48px;
    letter-spacing: -0.5px;
  }
  .question em {
    font-style: italic;
    color: #E8C04A;
  }
  /* Poll options */
  .poll-option {
    border: 1.5px solid rgba(255,255,255,0.18);
    border-radius: 12px;
    padding: 28px 36px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.04);
  }
  .poll-option.gold {
    border-color: rgba(218,165,33,0.5);
    background: rgba(218,165,33,0.08);
  }
  .poll-option-text {
    font-family: 'Georgia', serif;
    font-size: 26px;
    color: white;
    font-weight: 400;
  }
  .poll-option.gold .poll-option-text {
    color: #E8C04A;
  }
  .poll-option-flag {
    font-size: 32px;
  }
  /* Second question */
  .second-q {
    margin-top: 60px;
  }
  .second-q .question-eyebrow {
    margin-bottom: 16px;
  }
  .second-q .question {
    font-size: 44px;
    margin-bottom: 36px;
  }
  /* Text poll (tap to answer) */
  .tap-options {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .tap-opt {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.15);
    padding: 16px 28px;
    border-radius: 40px;
    font-family: 'Arial', sans-serif;
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .tap-opt.active {
    background: rgba(218,165,33,0.12);
    border-color: rgba(218,165,33,0.45);
    color: #DAA521;
  }
  /* Bottom */
  .bottom-cta {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 60px 120px;
  }
  .cta-line {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    text-align: center;
    margin-bottom: 20px;
  }
  .wa-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #25D366;
    padding: 22px 48px;
    border-radius: 8px;
    font-family: 'Arial', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: white;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="logo">ELIDE</span>
    <span class="tag">Quick question</span>
  </div>
  <div class="poll-area">
    <div class="question-eyebrow">Help us plan for you</div>
    <div class="question">Which Europe<br>would you visit<br><em>first?</em></div>
    <div class="poll-option gold">
      <span class="poll-option-text">Switzerland</span>
      <span class="poll-option-flag">🇨🇭</span>
    </div>
    <div class="poll-option">
      <span class="poll-option-text">Italy</span>
      <span class="poll-option-flag">🇮🇹</span>
    </div>
    <div class="poll-option">
      <span class="poll-option-text">France</span>
      <span class="poll-option-flag">🇫🇷</span>
    </div>
    <div class="poll-option">
      <span class="poll-option-text">All three!</span>
      <span class="poll-option-flag">✈️</span>
    </div>

    <div class="second-q">
      <div class="question-eyebrow">And one more</div>
      <div class="question">Who's<br><em>travelling</em><br>with you?</div>
      <div class="tap-options">
        <span class="tap-opt active">Family</span>
        <span class="tap-opt">Couple</span>
        <span class="tap-opt">Friends</span>
        <span class="tap-opt">Parents</span>
        <span class="tap-opt">Multi-family</span>
      </div>
    </div>
  </div>
  <div class="bottom-cta">
    <p class="cta-line">Tell us your answers via WhatsApp — we'll design your trip</p>
    <div class="wa-row">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">

      </svg>
      Chat with us on WhatsApp
    </div>
  </div>
</div>
</body>
</html>
