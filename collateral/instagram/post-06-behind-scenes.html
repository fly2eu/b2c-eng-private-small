<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Elide Instagram — Post 06: Behind the Scenes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .canvas {
    width: 1080px; height: 1080px;
    background: #FAF7F0;
    position: relative;
    overflow: hidden;
    display: flex;
  }
  .left {
    width: 52%;
    background: #12442E;
    padding: 72px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    clip-path: polygon(0 0, 100% 0, 92% 100%, 0 100%);
  }
  .right {
    flex: 1;
    padding: 72px 60px 72px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .bts-label {
    font-family: 'Arial', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #DAA521;
    margin-bottom: 24px;
  }
  .map-placeholder {
    flex: 1;
    border: 1.5px solid rgba(218,165,33,0.3);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    background: rgba(218,165,33,0.04);
  }
  .map-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(218,165,33,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(218,165,33,0.08) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .map-route {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .route-svg {
    width: 80%;
    height: 60%;
  }
  .pin {
    font-size: 24px;
    position: relative;
    z-index: 1;
  }
  .route-label {
    font-family: 'Arial', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.4);
    position: relative;
    z-index: 1;
  }
  .left-footer {
    font-family: 'Georgia', serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
  }
  .right-tag {
    display: inline-flex;
    background: rgba(18,68,46,0.08);
    border: 1px solid rgba(18,68,46,0.15);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'Arial', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #12442E;
    margin-bottom: 28px;
    align-self: flex-start;
  }
  h2 {
    font-family: 'Georgia', serif;
    font-size: 42px;
    font-weight: 400;
    line-height: 1.15;
    color: #1A1A14;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }
  h2 em {
    font-style: italic;
    color: #12442E;
  }
  .details {
    list-style: none;
    margin-bottom: 32px;
  }
  .details li {
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    color: #5A5A4A;
    margin-bottom: 10px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    line-height: 1.5;
  }
  .details li::before {
    content: '→';
    color: #DAA521;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .footer-handle {
    font-family: 'Arial', sans-serif;
    font-size: 12px;
    color: rgba(26,26,20,0.3);
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="left">
    <div>
      <div class="bts-label">Behind the scenes</div>
      <div class="map-placeholder">
        <div class="map-grid"></div>
        <svg class="route-svg" viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Route dots and path -->
          <circle cx="30" cy="120" r="5" fill="#DAA521"/>
          <circle cx="100" cy="80" r="5" fill="#DAA521"/>
          <circle cx="170" cy="50" r="5" fill="#DAA521"/>
          <circle cx="270" cy="30" r="5" fill="#DAA521"/>
          <!-- Path -->
          <path d="M30 120 C55 100 75 85 100 80 C125 75 145 58 170 50 C205 38 240 32 270 30"
            stroke="#DAA521" stroke-width="1.5" stroke-dasharray="6 4" fill="none" opacity="0.7"/>
          <!-- Labels -->
          <text x="22" y="140" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Geneva</text>
          <text x="88" y="68" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Bern</text>
          <text x="158" y="40" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Lucerne</text>
          <text x="257" y="22" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.5)">Zurich</text>
        </svg>
      </div>
    </div>
    <div class="left-footer">ELIDE</div>
  </div>
  <div class="right">
    <span class="right-tag">How we plan</span>
    <h2>Every route is<br>driven before<br>it's <em>designed.</em></h2>
    <ul class="details">
      <li>We drive every road we recommend — no guessing</li>
      <li>Rest stops, scenic detours, and fuel breaks planned in advance</li>
      <li>Hotel check-in times confirmed before your arrival</li>
    </ul>
    <div class="footer-handle">elide.com</div>
  </div>
</div>
</body>
</html>
