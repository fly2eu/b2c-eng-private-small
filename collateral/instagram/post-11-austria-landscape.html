<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Elide Instagram — Post 11: Austria Landscape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .canvas {
    width: 1080px; height: 1080px;
    position: relative;
    overflow: hidden;
    background: #050A14;
  }
  .bg-img {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=90&auto=format');
    background-size: cover;
    background-position: center 30%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,10,20,0.1) 0%,
      rgba(5,10,20,0.05) 40%,
      rgba(18,68,46,0.7) 72%,
      rgba(18,68,46,0.97) 100%
    );
  }
  .top-bar {
    position: absolute;
    top: 48px;
    left: 52px;
    right: 52px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo {
    font-family: 'Georgia', serif;
    font-size: 18px;
    letter-spacing: 5px;
    color: white;
    text-transform: uppercase;
  }
  .country-tag {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 7px 18px;
    border-radius: 20px;
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: white;
  }
  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 52px;
  }
  .eyebrow {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #DAA521;
    margin-bottom: 14px;
  }
  h2 {
    font-family: 'Georgia', serif;
    font-size: 68px;
    font-weight: 400;
    color: white;
    line-height: 1.05;
    margin-bottom: 24px;
    letter-spacing: -1px;
  }
  h2 em {
    font-style: italic;
    color: #E8C04A;
  }
  .add-on-note {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(218,165,33,0.25);
    padding: 12px 20px;
    border-radius: 8px;
  }
  .add-on-note p {
    font-family: 'Arial', sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
  }
  .add-on-note strong {
    color: #DAA521;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="top-bar">
    <span class="logo">ELIDE</span>
    <span class="country-tag">Austria</span>
  </div>
  <div class="content">
    <div class="eyebrow">Vienna · Salzburg · Hallstatt</div>
    <h2>Austria &amp;<br><em>Germany</em><br>await.</h2>
    <div class="add-on-note">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="#DAA521" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <p>Add <strong>Vienna + Salzburg</strong> to any Switzerland or Germany tour</p>
    </div>
  </div>
</div>
</body>
</html>
