<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elide — Business Card (Back)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1004px; height: 638px; background: white; }
  .card {
    width: 1004px;
    height: 638px;
    background: #FAF7F0;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 80px;
  }
  .top-rule {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, #12442E, #DAA521, #12442E);
  }
  .bottom-rule {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(to right, #12442E, #DAA521, #12442E);
  }
  .tagline {
    font-family: 'Georgia', serif;
    font-size: 28px;
    font-weight: 400;
    line-height: 1.3;
    color: #1A1A14;
    text-align: center;
    font-style: italic;
    margin-bottom: 32px;
    letter-spacing: -0.3px;
  }
  .tagline em {
    font-style: normal;
    color: #12442E;
  }
  .divider {
    width: 40px;
    height: 1.5px;
    background: #DAA521;
    margin: 0 auto 28px;
  }
  /* QR placeholder */
  .qr-area {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .qr-box {
    width: 100px;
    height: 100px;
    border: 2px solid rgba(18,68,46,0.15);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    position: relative;
    overflow: hidden;
  }
  /* Simulated QR pattern */
  .qr-inner {
    width: 80px; height: 80px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 1px;
  }
  .qr-cell { background: #12442E; border-radius: 1px; }
  .qr-cell.empty { background: transparent; }
  .qr-label {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(26,26,20,0.4);
    line-height: 1.6;
  }
  .qr-label strong {
    display: block;
    font-size: 13px;
    color: #12442E;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .wa-line {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }
  .wa-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #25D366;
  }
  .wa-text {
    font-family: 'Arial', sans-serif;
    font-size: 11px;
    color: #25D366;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-rule"></div>
  <div class="bottom-rule"></div>

  <p class="tagline">Your Europe.<br>Your pace. <em>Your family.</em></p>
  <div class="divider"></div>

  <div class="qr-area">
    <div class="qr-box">
      <!-- Simplified QR-like pattern (decorative placeholder) -->
      <div class="qr-inner">
        <div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell"></div>
        <div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div>
        <div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div>
        <div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div>
        <div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div>
        <div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div>
        <div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div>
        <div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div><div class="qr-cell empty"></div><div class="qr-cell"></div><div class="qr-cell"></div>
      </div>
    </div>
    <div class="qr-label">
      <strong>Scan to WhatsApp us</strong>
      Instant enquiries<br>for your Europe trip
      <div class="wa-line">
        <div class="wa-dot"></div>
        <span class="wa-text">We respond within 2 hours</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
